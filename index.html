<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maximum Subarray Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h1>Kadane's Algorithm Visualizer</h1>
        
        <div class="controls">
            <button id="startBtn">Visualize</button>
            <button id="resetBtn">Generate New Array</button>
        </div>

        <div class="variables">
            <p>Current Sum: <span id="currentSum">0</span></p>
            <p>Max Sum: <span id="maxSum">0</span></p>
        </div>

        <div id="arrayContainer" class="array-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
